name: Expo Frontend CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-web:
    name: Build Expo Web App
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm ci

      - name: Install Expo CLI
        run: npm install -g expo-cli

      - name: Build Web
        run: expo export:web --no-dev --minify

      - name: List Build Output
        run: ls -R

      - name: Upload Web Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: dist/

  build-android:
    name: Build Expo Android App
    runs-on: self-hosted
    needs: build-web

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm ci

      - name: Install Expo & EAS CLI
        run: |
          npm install -g expo-cli
          npm install -g eas-cli

      - name: Authenticate with Expo
        run: eas login --token ${{ secrets.EXPO_TOKEN }}

      - name: Build Android App
        run: eas build --platform android --non-interactive --profile production

      - name: Output Latest Build URL
        run: |
          echo "Android build completed."
          eas build:list --platform android --limit 1
